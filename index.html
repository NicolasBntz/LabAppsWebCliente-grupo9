<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ISTEA Laboratorio Aplicaciones Web Cliente | Grupo 9</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <head> 
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                 <a class="navbar-brand" href="#">Grupo n°9</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                 <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#" id="home">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="electronics">Electronics</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="jewelery">Jewelery</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="mens-clothing">Men's clothing</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="womens-clothing">Women's clothing</a>
                        </li>
                        <li class="d-flex align-items-center">
                            <button class="btn btn-outline-dark border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRight" aria-controls="offcanvasRight">
                                 <i class="bi bi-cart-plus"></i>
                            </button>

                            <button class="btn btn-outline-dark border-0 ms-2" id="theme-toggle" type="button" aria-label="Cambiar tema">
                                <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>    
    </head>

    <main class="container min-vh-100">
        <input type="text" class="form-control" name="Search" id = "inputSearch" placeholder="Buscar">
        <div class="row row-cols-1 row-cols-md-4 g-4 mt-5" id="product-list">
            <!-- generado desde js --> 
        </div>    
            <!-- modal --> 
        <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
        </div>

        <!-- Modal Confirmación Vaciar Carrito -->
        <div class="modal fade" id="confirmClearCartModal" tabindex="-1" aria-labelledby="confirmClearCartModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="confirmClearCartModalLabel">Confirmación</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        ¿Estás seguro de que deseas vaciar todos los productos del carrito?
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-danger" id="confirm-clear-btn">Sí, vaciar carrito</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Finalizar Compra -->
        <div class="modal fade" id="checkoutModal" tabindex="-1" aria-labelledby="checkoutModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="checkoutModalLabel">Finalizar Compra</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <h4 class="mb-4" id="checkout-total">Total: $0</h4>
                        <h6>Seleccione medio de pago:</h6>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="paymentMethod" id="credit" value="Crédito" checked>
                            <label class="form-check-label" for="credit">Tarjeta de Crédito</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="paymentMethod" id="debit" value="Débito">
                            <label class="form-check-label" for="debit">Tarjeta de Débito</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="paymentMethod" id="transfer" value="Transferencia">
                            <label class="form-check-label" for="transfer">Transferencia Bancaria</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-success" id="confirm-checkout-btn">Confirmar Compra</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- offcanvas carrito -->
        <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRight" aria-labelledby="offcanvasRightLabel">
            
            <div class="offcanvas-header">
                <h5 id="offcanvasRightLabel">Mi lista de compras</h5>
                <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            
            <div class="offcanvas-body">
                <!-- generado desde js -->
            </div>
            
            <!-- Le agregué la clase p-3 para que los botones tengan un margen interno prolijo -->
            <div class="offcanvas-footer p-3"> 
                <button class="btn btn-primary w-100" id="checkout-btn" data-bs-toggle="modal" data-bs-target="#checkoutModal">Finalizar compra</button>
                <button class="btn btn-secondary w-100 mt-2" id="clear-cart-btn" data-bs-toggle="modal" data-bs-target="#confirmClearCartModal">Vaciar carrito</button>
            </div>

        </div>
        <!-- toast template -->
        <div aria-live="polite" aria-atomic="true" class="position-fixed"
            style="z-index: 1055; top: 20px; right: 20px; width: 350px;">
            <div class="toast-container">
                <!-- generado desde js -->
            </div>
         </main>

    <footer class="text-center bg-dark text-white py-3 mt-4" style="height: 150px;">
        <p class="mt-5 fs-4">&copy; 2026 ISTEA Grupo 9</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="./src/index.js"> </script>
  </body>
</html>
