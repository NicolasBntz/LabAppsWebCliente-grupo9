<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ISTEA Laboratorio Aplicaciones Web Cliente | Grupo 9</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <head> 
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                 <a class="navbar-brand" href="#">Grupo n°9</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                 <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="Electronics">Electronics</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="Jewelery">Jewelery</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="mens-clothing">Men's clothing</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="womens-clothing">Women's clothing</a>
                        </li>
                        <li>
                            <button class="btn btn-outline-dark border-0" type="button" data-bs-toggle="offcanvas"
                                    data-bs-target="#offcanvasRight" aria-controls="offcanvasRight">
                                    <i class="bi bi-cart-plus"></i>
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>    
    </head>

    <main class="container">
        <input type="text" class="form-control" name="Search" id = "inputSearch" value="Buscar">
        <div class="row row-cols-1 row-cols-md-4 g-4 mt-5" id="product-list">
            <!-- generado desde js --> 
        </div>    
            <!-- modal --> 
        <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
        </div>
            <!-- offcanvas carrito -->
        <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasRight" aria-labelledby="offcanvasRightLabel">
            
            <div class="offcanvas-header">
                <h5 id="offcanvasRightLabel">Mi lista de compras</h5>
                <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
            </div>
            
            <div class="offcanvas-body">
                <!-- generado desde js -->
            </div>
            
            <!-- Le agregué la clase p-3 para que los botones tengan un margen interno prolijo -->
            <div class="offcanvas-footer p-3"> 
                <button class="btn btn-primary w-100" id="checkout-btn">Finalizar compra</button>
                <button class="btn btn-secondary w-100 mt-2" id="clear-cart-btn">Vaciar carrito</button>
            </div>

        </div>
        <!-- toast template -->
        <div aria-live="polite" aria-atomic="true" class="position-fixed"
            style="z-index: 1055; top: 20px; right: 20px; width: 350px;">
            <div class="toast-container">
                <!-- generado desde js -->
            </div>
         </main>

    <footer>
        <p>&copy; 2026 ISTEA Grupo 9</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="./src/index.js"> </script>
  </body>
</html>
